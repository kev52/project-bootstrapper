# backbone.yml — {project_name}
# Auto-generated. Update when project structure changes.
version: 1

structure:
  src: src/
  tests: tests/
  config: config/
  docs: docs/
  scripts: scripts/

conventions:
  test_pattern: "test_*.py"
  config_format: yaml
  entry_point: src/main.py
  build_output: dist/

boundaries:
  never_modify:
    - .env
    - .env.*
    - poetry.lock
    - requirements.txt
    - "*.pyc"
    - __pycache__/
    - .venv/

agents:
  claude:
    main_instruction_file: CLAUDE.md
    rules: .claude/rules/
    skills: .claude/skills/
    commands: .claude/commands/
    agents: .claude/agents/
